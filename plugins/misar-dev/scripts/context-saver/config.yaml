# Context Saver — 4D Router Configuration (v8.3.0)
# Dimensions: Model × Effort × Version × Context Window
# Models: haiku 4.5 (200K) · sonnet 4.6 (200K | 1M) · opus 4.7 (200K | 1M)
# Providers: claude (default) · misarcoder (free MoE) · assisters (free WritingSkill)

# ─── Model selection based on task complexity ───
model_routing:
  haiku:
    - pattern: ['typo', 'simple fix', 'quick question', 'read file', 'list files',
                'check status', 'what is', 'show me', 'git status', 'rename',
                'delete', 'move', 'grep', 'search for', 'find file']
    - token_estimate: '<2000'

  sonnet:
    - pattern: ['implement', 'refactor', 'debug', 'review', 'test', 'fix bug',
                'add feature', 'update', 'modify', 'create component', 'write function']
    - token_estimate: '2000-10000'

  opus:
    - pattern: ['architecture', 'full system', 'complex migration', 'multi-service',
                'design system', 'plan', 'strategy', 'full-suite', 'compliance audit']
    - token_estimate: '>10000'

# ─── Effort level routing (NEW in v7.0.0) ───
effort_routing:
  low:
    - pattern: ['read file', 'list files', 'grep', 'search for', 'find file',
                'git status', 'show me', 'what is', 'check status', 'rename',
                'delete', 'move', 'ls', 'cat', 'head']
    - token_estimate: '<500'

  medium:
    - pattern: ['implement', 'update', 'modify', 'create', 'write',
                'add feature', 'fix bug', 'simple fix', 'typo',
                'quick question', 'standard', 'basic']
    - token_estimate: '500-5000'

  high:
    - pattern: ['review', 'debug', 'refactor', 'test', 'analyze',
                'security', 'optimize', 'investigate', 'deep dive',
                'performance', 'vulnerability']
    - token_estimate: '5000-15000'

  max:
    - pattern: ['architecture', 'full-suite', 'compliance', 'design system',
                'full system', 'audit all', 'strategy', 'migration plan',
                'complete analysis', '49 frameworks']
    - token_estimate: '>15000'

# ─── Version routing (v8.3.0 — opus upgraded to 4.7) ───
version_routing:
  '4.5':
    models: ['haiku']
    model_ids: ['claude-haiku-4-5-20251001']
    reason: 'Cheapest available for lightweight tasks (200K context)'
  '4.6':
    models: ['sonnet']
    model_ids: ['claude-sonnet-4-6']
    reason: 'Latest sonnet for code accuracy (200K context)'
  '4.7':
    models: ['opus']
    model_ids: ['claude-opus-4-7']
    reason: 'Latest opus for complex reasoning (200K context)'

# ─── 1M context-window variants (v8.3.0) ───
# Used for full-suite audits, monorepos, cross-repo migrations, transcripts >150K tokens.
# Cost: ~2x standard 200K rate — only triggered when codebase scope clearly exceeds 200K.
context_1m:
  enabled: true
  variants:
    sonnet_1m: 'claude-sonnet-4-6[1m]'
    opus_1m: 'claude-opus-4-7[1m]'
  triggers:
    patterns:
      - 'full-suite'
      - 'full audit'
      - 'audit all'
      - 'monorepo'
      - 'entire codebase'
      - 'whole codebase'
      - 'across all files'
      - 'compliance audit'
      - '49 frameworks'
      - 'multi-repo'
      - 'cross-repo'
      - '--1m'
    transcript_token_threshold: 150000   # auto-promote to 1M when transcript exceeds this

# ─── External-provider offload (route OUT of Claude entirely) ───
# These tasks should NEVER consume Claude credits — push to free MoE / WritingSkill.
external_providers:
  misarcoder:
    endpoint: 'http://localhost:8000'
    model: 'gemini-2.5-flash'
    fallback_model: 'groq/llama-3.3-70b-versatile'
    handles:
      - 'commit message'
      - 'pr description'
      - 'changelog'
      - 'release notes'
      - 'readme section'
      - 'api docs'
      - 'code explanation'
      - 'simple q&a'
      - 'file summary'
  assisters:
    endpoint: 'https://assisters.dev/api/v1'
    model: 'assisters-chat-v1'
    handles:
      - 'blog post'
      - 'long-form article'
      - 'tutorial'
      - 'newsletter'
      - 'email campaign'
      - 'marketing copy'
      - 'documentation site content'
      - 'landing page copy'

# ─── Misar-dev slash command → 3D routing (replaces misar_dev_commands) ───
misar_dev_commands:
  '/misar-dev:full-suite':
    model: opus
    effort: max
    version: '4.7'
    context_1m: true
  '/misar-dev:compliance':
    model: opus
    effort: max
    version: '4.7'
    context_1m: true
  '/misar-dev:security':
    model: sonnet
    effort: high
    version: '4.6'
  '/misar-dev:qa':
    model: sonnet
    effort: high
    version: '4.6'
  '/misar-dev:marketing':
    model: sonnet
    effort: medium
    version: '4.6'
  '/misar-dev:uiux':
    model: sonnet
    effort: medium
    version: '4.6'
  '/misar-dev:product':
    model: sonnet
    effort: medium
    version: '4.6'
  '/misar-dev:brand':
    model: sonnet
    effort: medium
    version: '4.6'
  '/misar-dev:tester':
    model: sonnet
    effort: medium
    version: '4.6'
  '/misar-dev:content':
    model: haiku
    effort: medium
    version: '4.5'
  '/misar-dev:auditor':
    model: haiku
    effort: medium
    version: '4.5'
  '/misar-dev:context-saver':
    model: haiku
    effort: low
    version: '4.5'

# ─── Misar-dev agent 3D assignments (replaces misar_dev_agent_models) ───
misar_dev_agent_models:
  opus_max:
    effort: max
    version: '4.7'
    context_1m: true
    agents:
      - orchestrator-agents
      - compliance-agents
  opus_high:
    effort: high
    version: '4.7'
    agents: []
  sonnet_high:
    effort: high
    version: '4.6'
    agents:
      - security-agents
      - qa-agents
  sonnet_medium:
    effort: medium
    version: '4.6'
    agents:
      - marketing-agents
      - uiux-agents
      - product-agents
      - brand-agents
      - tester-agents
  haiku_medium:
    effort: medium
    version: '4.5'
    agents:
      - content-agents
      - auditor-agents
  haiku_low:
    effort: low
    version: '4.5'
    agents:
      - context-saver

# ─── Token budget management ───
token_budget:
  max_context_window: 200000
  max_agents_context: 12000
  warning_threshold: 0.70
  critical_threshold: 0.90
  compaction_trigger: 0.75
  # Budget-driven 3D overrides
  budget_overrides:
    above_90:
      model: haiku
      effort: low
      version: '4.5'
      action: 'warn user + suggest /compact'
    above_70:
      model: haiku
      effort: low
      version: '4.5'
      action: 'silent downgrade'
    above_40:
      max_model: sonnet
      max_effort: medium
      action: 'cap at sonnet+medium, no opus'

# ─── Agent routing rules — maps keywords to skills/agents ───
routing_rules:
  frontend:
    patterns: ['react', 'vue', 'angular', 'svelte', 'jsx', 'tsx', 'component', 'frontend', 'ui', 'css', 'tailwind']
    agents: ['frontend-mobile-development:frontend-developer', 'ui-design:ui-designer']
    priority: critical

  backend:
    patterns: ['api', 'backend', 'server', 'fastapi', 'django', 'express', 'nodejs', 'endpoint']
    agents: ['backend-development:backend-architect', 'api-scaffolding:backend-architect']
    priority: critical

  database:
    patterns: ['database', 'sql', 'postgres', 'mysql', 'mongodb', 'supabase', 'schema', 'migration', 'query']
    agents: ['database-design:database-architect', 'database-design:sql-pro']
    priority: critical

  security:
    patterns: ['security', 'auth', 'oauth', 'jwt', 'vulnerability', 'xss', 'csrf', 'encryption']
    agents: ['security-scanning:security-auditor', 'backend-api-security:backend-security-coder']
    priority: critical

  testing:
    patterns: ['test', 'testing', 'jest', 'pytest', 'tdd', 'unit test', 'integration test', 'e2e']
    agents: ['unit-testing:test-automator', 'tdd-workflows:tdd-orchestrator']
    priority: high

  debugging:
    patterns: ['debug', 'error', 'bug', 'issue', 'fix', 'troubleshoot', 'crash', 'exception']
    agents: ['error-debugging:debugger', 'debugging-toolkit:dx-optimizer']
    priority: critical

  review:
    patterns: ['review', 'pr review', 'code review', 'refactor']
    agents: ['pr-review-toolkit:code-reviewer', 'code-review-ai:architect-review']
    priority: high

  cloud:
    patterns: ['cloud', 'aws', 'azure', 'gcp', 'deploy', 'docker', 'kubernetes', 'k8s', 'ci/cd']
    agents: ['cloud-infrastructure:cloud-architect', 'cicd-automation:deployment-engineer']
    priority: critical

  docs:
    patterns: ['documentation', 'docs', 'readme', 'api docs', 'diagram']
    agents: ['documentation-generation:docs-architect', 'c4-architecture:c4-context']
    priority: medium

  ml:
    patterns: ['machine learning', 'ml', 'ai', 'llm', 'langchain', 'vector', 'embeddings']
    agents: ['llm-application-dev:ai-engineer', 'machine-learning-ops:ml-engineer']
    priority: critical

  performance:
    patterns: ['performance', 'optimize', 'slow', 'latency', 'speed', 'benchmark']
    agents: ['application-performance:performance-engineer']
    priority: high

  misar_audit:
    patterns: ['audit', 'full-suite', 'compliance', 'seo', 'accessibility', 'wcag']
    agents: ['misar-dev:orchestrator-agents']
    priority: high

# ─── Agent dependencies ───
agent_dependencies:
  'api-scaffolding:backend-architect':
    - 'database-design:database-architect'
    - 'backend-api-security:backend-security-coder'
  'frontend-mobile-development:frontend-developer':
    - 'ui-design:ui-designer'
  'unit-testing:test-automator':
    - 'error-debugging:debugger'

# ─── Fallback when no match ───
fallback:
  agents: ['general-purpose']
  model: 'sonnet'
  effort: 'medium'
  version: '4.6'
